<main>

<section class="dashboard">

    <div class="panel">

        <div class="panel-header">
            <h2>🟢 Server Online</h2>
            <span id="last-updated">Just now</span>
        </div>

        <p class="server-info">
            Ubuntu 24.04 • Singapore VPS
        </p>

        <div class="metric">
            <div class="metric-title">
                <span>CPU</span>
                <span id="cpu-value">42%</span>
            </div>
            <div class="progress">
                <div id="cpu-bar" class="fill" style="width:42%"></div>
            </div>
        </div>

        <div class="metric">
            <div class="metric-title">
                <span>RAM</span>
                <span id="ram-value">31%</span>
            </div>
            <div class="progress">
                <div id="ram-bar" class="fill" style="width:31%"></div>
            </div>
        </div>

        <div class="metric">
            <div class="metric-title">
                <span>Swap</span>
                <span id="swap-value">0%</span>
            </div>
            <div class="progress">
                <div id="swap-bar" class="fill" style="width:0%"></div>
            </div>
        </div>

        <div class="metric">
            <div class="metric-title">
                <span>Storage</span>
                <span id="disk-value">44%</span>
            </div>
            <div class="progress">
                <div id="disk-bar" class="fill" style="width:44%"></div>
            </div>
        </div>

    </div>

    <div class="panel">

        <h2>3X-UI Traffic</h2>

        <div class="traffic">
            <span>⬆ Upload</span>
            <strong id="upload">0 B</strong>
        </div>

        <div class="traffic">
            <span>⬇ Download</span>
            <strong id="download">0 B</strong>
        </div>

        <div class="traffic total">
            <span>📊 Total Usage</span>
            <strong id="total">0 B</strong>
        </div>

    </div>

</section>

</main>
