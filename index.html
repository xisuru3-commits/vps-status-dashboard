<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infrastructure Status</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-glow"></div>

<header class="topbar">

<div class="brand">

<div class="brand-dot"></div>

<div>

<h2>Infrastructure</h2>
<p>Live Server Monitor</p>

</div>

</div>

<div class="status-pill">

<span class="status-dot"></span>

Server Online

</div>

</header>

<main class="container">

<section class="hero">

<div class="hero-left">

<h1>

Server
<span>Online</span>

</h1>

<p>

Ubuntu 24.04 LTS

<br>

Singapore VPS

</p>

</div>

<div class="hero-right">

<div class="hero-circle">

<div class="hero-core"></div>

</div>

</div>

</section>

<section class="grid">

<div class="card">

<h2>System Resources</h2>

<div class="metric">

<div class="metric-head">

<span>CPU</span>

<strong id="cpuText">42%</strong>

</div>

<div class="bar">

<div class="fill cpu"></div>

</div>

</div>

<div class="metric">

<div class="metric-head">

<span>RAM</span>

<strong id="ramText">31%</strong>

</div>

<div class="bar">

<div class="fill ram"></div>

</div>

</div>

<div class="metric">

<div class="metric-head">

<span>Swap</span>

<strong id="swapText">0%</strong>

</div>

<div class="bar">

<div class="fill swap"></div>

</div>

</div>

<div class="metric">

<div class="metric-head">

<span>Storage</span>

<strong id="diskText">44%</strong>

</div>

<div class="bar">

<div class="fill disk"></div>

</div>

</div>

</div>

<div class="card">

<h2>3X-UI Traffic</h2>

<div class="traffic">

<div>

<h3>Upload</h3>

<p>Total Uploaded</p>

</div>

<strong id="upload">

0 B

</strong>

</div>

<div class="traffic">

<div>

<h3>Download</h3>

<p>Total Downloaded</p>

</div>

<strong id="download">

0 B

</strong>

</div>

<div class="traffic">

<div>

<h3>Total Usage</h3>

<p>Upload + Download</p>

</div>

<strong id="total">

0 B

</strong>

</div>

</div>

</section>

<section class="footer-card">

<div>

<h3>Last Updated</h3>

<p id="updated">

Just now

</p>

</div>

<button id="refresh">

Refresh

</button>

</section>

</main>

<script src="script.js"></script>

</body>

</html>
