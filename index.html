<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Status</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

<header>

<h1>System Status</h1>

<p>All services are operating normally.</p>

</header>

<section class="status-card">

<div class="status-header">

<div>

<h2>Infrastructure</h2>

<span class="online">
🟢 Operational
</span>

</div>

<div class="time">

Updated just now

</div>

</div>

<div class="metric">

<div class="label">

CPU Usage

<span>42%</span>

</div>

<div class="bar">

<div class="fill cpu"></div>

</div>

</div>

<div class="metric">

<div class="label">

Memory

<span>61%</span>

</div>

<div class="bar">

<div class="fill ram"></div>

</div>

</div>

<div class="metric">

<div class="label">

Disk Usage

<span>28%</span>

</div>

<div class="bar">

<div class="fill disk"></div>

</div>

</div>

<div class="grid">

<div class="box">

<h3>Uptime</h3>

<p>15 Days</p>

</div>

<div class="box">

<h3>Latency</h3>

<p>11 ms</p>

</div>

<div class="box">

<h3>Region</h3>

<p>Singapore</p>

</div>

<div class="box">

<h3>Connections</h3>

<p>27</p>

</div>

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
