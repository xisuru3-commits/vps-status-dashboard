<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Status</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-blur blur1"></div>
<div class="background-blur blur2"></div>

<header class="hero">

    <div class="hero-top">
        <div class="status">
            <span class="status-dot"></span>
            <span>All Systems Operational</span>
        </div>

        <div id="current-time"></div>
    </div>

    <h1>Infrastructure Status</h1>

    <p>
        Real-time monitoring for servers, network,
        uptime and system health.
    </p>

</header>

<main>

<section class="grid">

<div class="card">
    <h3>🇸🇬 Singapore VPS</h3>
    <p class="online">Operational</p>
</div>

<div class="card">
    <h3>🇯🇵 Tokyo VPS</h3>
    <p class="online">Operational</p>
</div>

<div class="card">
    <h3>API Services</h3>
    <p class="online">Operational</p>
</div>

<div class="card">
    <h3>Website</h3>
    <p class="online">Operational</p>
</div>

</section>

<section class="card uptime">

<h2>90-Day Uptime</h2>

<div class="uptime-value">
99.98%
</div>

<div class="graph">

<div></div><div></div><div></div><div></div>
<div></div><div></div><div></div><div></div>
<div></div><div></div><div></div><div></div>
<div></div><div></div><div></div><div></div>
<div></div><div></div><div></div><div></div>

</div>

</section>

<section class="card">

<h2>Recent Activity</h2>

<div class="incident">
✔ No incidents reported.
</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
